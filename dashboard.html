<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle - Data Dashboard</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #EC0000; margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        .header p { color: #888; margin-top: 5px; font-size: 1.1rem; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        
        .card h3 { margin: 0 0 15px 0; color: #aaa; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .card .number { font-size: 4rem; font-weight: bold; margin: 0; }
        
        /* Colores Específicos por Tarjeta */
        .color-total { color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .color-presencial { color: #EC0000; text-shadow: 0 0 15px rgba(236,0,0,0.4); }
        .color-streaming { color: #4EB1B3; text-shadow: 0 0 15px rgba(78,177,179,0.4); }
        .color-interaction { color: #E89C31; text-shadow: 0 0 15px rgba(232,156,49,0.4); }

        .row-secondary { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1000px; margin-top: 20px; }
        .mini-card { background: rgba(255, 255, 255, 0.03); border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .mini-card h4 { margin: 0; color: #888; }
        .mini-card span { font-size: 2rem; font-weight: bold; color: #A24281; }

    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="header">
        <h1>LIVE METRICS</h1>
        <p>Rendimiento de la Activación en Tiempo Real</p>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Total Avatares</h3>
            <p class="number color-total" id="stat-total">0</p>
        </div>
        <div class="card">
            <h3>🏢 Sala Presencial</h3>
            <p class="number color-presencial" id="stat-presencial">0</p>
        </div>
        <div class="card">
            <h3>💻 Sala Streaming</h3>
            <p class="number color-streaming" id="stat-streaming">0</p>
        </div>
    </div>

    <div class="row-secondary">
        <div class="mini-card">
            <h4>💬 Mensajes en Pantalla</h4>
            <span id="stat-chats">0</span>
        </div>
        <div class="mini-card">
            <h4>🌟 Usuarios con "Estrella"</h4>
            <span id="stat-stars">0</span>
        </div>
    </div>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", 
            authDomain: "jungle-multiverse.firebaseapp.com", 
            databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", 
            projectId: "jungle-multiverse", 
            storageBucket: "jungle-multiverse.firebasestorage.app", 
            messagingSenderId: "648498270563", 
            appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variables de conteo
        let countPresencial = 0;
        let countStreaming = 0;

        // Función para procesar y contar atributos dentro de un nodo
        function procesarDatos(snapshot, tipo) {
            let total = 0;
            let activeChats = 0;
            let activeStars = 0;
            const now = Date.now();

            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    total++;
                    const data = child.val();
                    
                    // Cuenta mensajes recientes (menos de 6 segundos de antigüedad)
                    if (data.message && data.message !== "" && (now - data.messageTime) < 6000) {
                        activeChats++;
                    }
                    
                    // Cuenta cuántos tienen el power-up activado
                    if (data.isStarPower) {
                        activeStars++;
                    }
                });
            }

            return { total, activeChats, activeStars };
        }

        // Listeners en Tiempo Real
        database.ref('avatars_presencial').on('value', (snap) => {
            const stats = procesarDatos(snap);
            countPresencial = stats.total;
            actualizarUI(stats.activeChats, stats.activeStars, 'presencial');
        });

        database.ref('avatars_streaming').on('value', (snap) => {
            const stats = procesarDatos(snap);
            countStreaming = stats.total;
            actualizarUI(stats.activeChats, stats.activeStars, 'streaming');
        });

        // Variables globales temporales para sumar chats y estrellas de ambas salas
        let totalChats = { presencial: 0, streaming: 0 };
        let totalStars = { presencial: 0, streaming: 0 };

        function actualizarUI(chats, stars, sala) {
            // Actualiza contadores por sala
            totalChats[sala] = chats;
            totalStars[sala] = stars;

            // Actualiza el DOM
            document.getElementById('stat-presencial').innerText = countPresencial;
            document.getElementById('stat-streaming').innerText = countStreaming;
            document.getElementById('stat-total').innerText = countPresencial + countStreaming;
            
            document.getElementById('stat-chats').innerText = totalChats.presencial + totalChats.streaming;
            document.getElementById('stat-stars').innerText = totalStars.presencial + totalStars.streaming;
        }

        // Un intervalo rápido para asegurar que los chats que expiran (después de 6 segundos) 
        // desaparezcan del contador aunque no haya cambios nuevos en la base de datos.
        setInterval(() => {
            database.ref('avatars_presencial').once('value').then(snap => {
                const stats = procesarDatos(snap);
                actualizarUI(stats.activeChats, stats.activeStars, 'presencial');
            });
            database.ref('avatars_streaming').once('value').then(snap => {
                const stats = procesarDatos(snap);
                actualizarUI(stats.activeChats, stats.activeStars, 'streaming');
            });
        }, 2000);

    </script>
</body>
</html>
