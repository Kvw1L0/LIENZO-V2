<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Multiverse</title>
    <style>
        body { margin: 0; background: #0a0a0a url('fondo.png') no-repeat center center fixed; background-size: cover; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        .glass-panel { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 350px; margin-top: 15px; z-index: 10; }
        
        /* PANTALLA INICIAL (Sin blur, transparente para ver fondo.png completo) */
        #name-popup { position: fixed; inset: 0; background: transparent; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        
        /* Sombras en los inputs para que resalten sobre cualquier fondo */
        .input-field { padding: 15px; font-size: 1.1rem; border-radius: 14px; border: 2px solid #EC0000; margin-bottom: 15px; width: 80%; max-width: 300px; text-align: center; background: white; color: #1a1a1a; font-weight: bold; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        select.input-field { appearance: none; }
        
        .btn-primary { padding: 16px 30px; background: #EC0000; color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(236,0,0,0.4); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.95); }

        /* Vistas ocultas por defecto */
        #draw-view { display: none; }
        #interaction-view { display: none; }

        .tools-panel { display: flex; gap: 12px; margin-bottom: 15px; }
        .color-btn { width: 38px; height: 38px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
        .color-btn.active { border-color: white; transform: scale(1.2); }

        #canvas-container { position: relative; width: 100%; height: 350px; background: rgba(0,0,0,0.4); border-radius: 18px; overflow: hidden; touch-action: none; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .fly-out { transform: scale(0.1) rotate(720deg); opacity: 0; filter: blur(10px); }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
        .guide { position: absolute; inset: 0; pointer-events: none; opacity: 0.4; display: flex; justify-content: center; align-items: center; transition: opacity 0.4s; }
        
        .controls { width: 100%; margin-top: 15px; display: grid; grid-template-columns: 1fr 2fr; gap: 12px; }
        .btn-controls { padding: 14px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1rem; color: white; transition: 0.2s; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn-neon { background: linear-gradient(45deg, #EC0000, #E89C31, #4EB1B3, #A24281); background-size: 200%; animation: gradientBG 4s infinite linear; }
        
        #ar-view { display: none; position: fixed; inset: 0; z-index: 50; background: black; }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #ar-overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; animation: floatAR 3s ease-in-out infinite; }
        .close-ar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #EC0000; padding: 15px 30px; border-radius: 50px; font-weight: bold; color: white; border: none; z-index: 60; }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes floatAR { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #shake-indicator { color: #EC0000; font-weight: bold; margin-top: 10px; display: none; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="name-popup">
         
        
        <select id="mode-select" class="input-field">
            <option value="presencial">🏢 PRESENCIAL</option>
            <option value="streaming">💻 STREAMING</option>
        </select>
        
        <input type="text" id="name-input" class="input-field" placeholder="Tu Nombre" maxlength="12">
        <button class="btn-primary" onclick="initApp()">COMENZAR</button>
    </div>

    <div id="ar-view">
        <video id="camera-feed" autoplay playsinline></video>
        <img id="ar-overlay" src="">
        <button class="close-ar" onclick="closeAR()">CERRAR CÁMARA</button>
    </div>

    <div id="draw-view" class="glass-panel">
        <h3 style="margin: 0 0 15px 0;">DIBUJA TU ROSTRO</h3>
        <div class="tools-panel">
            <button class="color-btn active" style="background: #EC0000;" onclick="setColor('#EC0000', this)"></button>
            <button class="color-btn" style="background: #E89C31;" onclick="setColor('#E89C31', this)"></button>
            <button class="color-btn" style="background: #4EB1B3;" onclick="setColor('#4EB1B3', this)"></button>
            <button class="color-btn" style="background: #A24281;" onclick="setColor('#A24281', this)"></button>
            <button class="color-btn" style="background: #4EA180;" onclick="setColor('#4EA180', this)"></button>
        </div>
        <div id="canvas-container">
            <div class="guide" id="drawing-guide">
                <svg width="200" height="250" viewBox="0 0 100 120"><path d="M 25 120 Q 25 90 50 90 Q 75 90 75 120 M 50 90 Q 80 90 80 45 Q 80 10 50 10 Q 20 10 20 45 Q 20 90 50 90" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="5,5"/></svg>
            </div>
            <canvas id="paintCanvas"></canvas>
        </div>
        <div class="controls">
            <button class="btn-controls" style="background: #333;" onclick="clearCanvas()">BORRAR</button>
            <button class="btn-controls" style="background: #EC0000;" onclick="sendDrawing()">¡ENVIAR AL PORTAL!</button>
        </div>
    </div>

    <div id="interaction-view" class="glass-panel">
        <h3 style="color: #4EB1B3; margin: 0;">¡ESTÁS EN PANTALLA!</h3>
        <p id="shake-indicator">¡AGITANDO EL TELÉFONO! ⚡</p>
        
        <button class="btn-controls" style="background: #E89C31; width: 100%; margin: 15px 0;" onclick="triggerRadar()">📍 ¡ENCONTRAR MI DIBUJO!</button>
        

        <input type="text" id="chat-box" class="input-field" style="width: calc(100% - 30px); padding: 10px; margin-bottom: 10px;" placeholder="Di algo..." maxlength="25">
        <button class="btn-controls" style="background: #4EB1B3; width: 100%; margin-bottom: 15px;" onclick="sendMessage()">ENVIAR MENSAJE</button>

        <div class="action-grid">
            <button class="btn-controls" style="background: #555;" id="btn-spin">🔄 GIRAR</button>
            <button class="btn-controls btn-neon" onclick="toggleMixColor()">🌟 ESTRELLA</button>
        </div>
        
        <button style="background: transparent; border: none; color: #aaa; margin-top: 25px; text-decoration: underline;" onclick="resetApp()">Dibujar de nuevo</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userName = "", currentMode = "", myAvatarRef = null, isMixColor = false;
        let lastX, lastY, lastZ;
        let isShaking = false;

        function initApp() {
            const input = document.getElementById('name-input');
            const select = document.getElementById('mode-select');
            if(input.value.trim() === "") { alert("Ingresa tu apodo para continuar."); return; }
            
            userName = input.value.trim();
            currentMode = select.value; 
            
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => { if (state === 'granted') window.addEventListener('devicemotion', handleMotion); })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
            
            // Ocultar popup inicial y mostrar vista de dibujo
            document.getElementById('name-popup').style.display = 'none';
            document.getElementById('draw-view').style.display = 'flex';
            
            // Reajustar el canvas inmediatamente para evitar errores de coordenadas
            resizeCanvas();
        }

        function handleMotion(event) {
            if(!myAvatarRef) return;
            let acc = event.accelerationIncludingGravity;
            if(!acc) return;
            if(lastX !== undefined) {
                let delta = Math.abs(acc.x - lastX + acc.y - lastY + acc.z - lastZ);
                if(delta > 15 && !isShaking) {
                    isShaking = true;
                    document.getElementById('shake-indicator').style.display = 'block';
                    myAvatarRef.update({ isShaking: true });
                    if(navigator.vibrate) navigator.vibrate(100);
                    setTimeout(() => {
                        isShaking = false;
                        document.getElementById('shake-indicator').style.display = 'none';
                        myAvatarRef.update({ isShaking: false });
                    }, 1000);
                }
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        function resizeCanvas() { 
            if(container.clientWidth > 0) {
                canvas.width = container.clientWidth; 
                canvas.height = container.clientHeight; 
            }
        }
        window.addEventListener('resize', resizeCanvas);

        let drawing = false, paths = [], currentPath = [], currentColor = '#EC0000';
        ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        function setColor(color, btn) { currentColor = color; document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        
        const startDrawing = (e) => { 
            document.getElementById('drawing-guide').style.opacity = '0'; 
            drawing = true; currentPath = []; paths.push({ color: currentColor, points: currentPath }); addPoint(e); 
        };
        const draw = (e) => { if (!drawing) return; addPoint(e); };
        const stopDrawing = () => { drawing = false; };

        function addPoint(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            if (clientX === undefined || clientY === undefined) return;
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            currentPath.push({x, y}); redrawAll();
        }

        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            paths.forEach(pathObj => {
                if(pathObj.points.length > 0) { 
                    ctx.strokeStyle = pathObj.color; ctx.beginPath(); 
                    ctx.moveTo(pathObj.points[0].x, pathObj.points[0].y); 
                    pathObj.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke(); 
                }
            });
        }
        function clearCanvas() { paths = []; redrawAll(); document.getElementById('drawing-guide').style.opacity = '0.4'; }

        function sendDrawing() {
            if (paths.length === 0) { alert("¡Dibuja tu rostro primero!"); return; }
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            container.classList.add('fly-out');

            setTimeout(() => {
                const drawingData = { paths, userName, timestamp: Date.now(), message: "", isSpinning: false, isStarPower: false, isShaking: false, radarPing: 0 };
                myAvatarRef = database.ref('avatars_' + currentMode).push();
                myAvatarRef.set(drawingData).then(() => {
                    document.getElementById('ar-overlay').src = canvas.toDataURL();
                    document.getElementById('draw-view').style.display = 'none';
                    document.getElementById('interaction-view').style.display = 'flex';
                });
            }, 800);
        }

        async function openAR() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('camera-feed').srcObject = stream;
                document.getElementById('ar-view').style.display = 'block';
            } catch (err) { alert("No se pudo iniciar la cámara."); }
        }
        function closeAR() {
            const stream = document.getElementById('camera-feed').srcObject;
            if(stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('ar-view').style.display = 'none';
        }

        function triggerRadar() { if(myAvatarRef) myAvatarRef.update({ radarPing: Date.now() }); }
        function sendMessage() { const text = document.getElementById('chat-box').value; if(text.trim() !== "" && myAvatarRef) { myAvatarRef.update({ message: text.trim(), messageTime: Date.now() }); document.getElementById('chat-box').value = ""; } }
        function toggleMixColor() { if(myAvatarRef) { isMixColor = !isMixColor; myAvatarRef.update({ isStarPower: isMixColor }); } }
        
        const btnSpin = document.getElementById('btn-spin');
        btnSpin.addEventListener('touchstart', (e) => { e.preventDefault(); if(myAvatarRef) myAvatarRef.update({ isSpinning: true }); }, { passive: false });
        btnSpin.addEventListener('mousedown', () => { if(myAvatarRef) myAvatarRef.update({ isSpinning: true }); });
        window.addEventListener('touchend', () => { if(myAvatarRef) myAvatarRef.update({ isSpinning: false }); });
        window.addEventListener('mouseup', () => { if(myAvatarRef) myAvatarRef.update({ isSpinning: false }); });

        function resetApp() { clearCanvas(); isMixColor = false; container.classList.remove('fly-out'); document.getElementById('interaction-view').style.display = 'none'; document.getElementById('draw-view').style.display = 'flex'; resizeCanvas(); }
        
        canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw); window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing); canvas.addEventListener('touchmove', draw); window.addEventListener('touchend', stopDrawing);
    </script>
</body>
</html>
